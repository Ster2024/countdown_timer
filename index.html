<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Timer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="main.js" defer></script>
</head>
<body>
  <!-- Setup View -->
  <section id="setup-view" class="view">
    <h1>Probus Countdown Timer Configuration</h1>
    <table id="timerTitles">
      <tr>
        <th>Title 1: </th>
        <th id="Title1">Meeting starts in</th>
      </tr>
      <tr>
        <th>Title 2: </th>
        <th id="Title2">Meeting resumes in</th>
      </tr>
    </table>
    <div class="input-group">
      <label for="titleSelect">Select Title:</label>
      <select id="titleSelect">
        <option value="Title1">Title 1</option>
        <option value="Title2">Title 2</option>
      </select>
    </div>
    <div class="input-group">
      <label for="countdownInput">Enter Countdown Timer (in minutes):</label>
      <input type="number" id="countdownInput" min="1" step="1" required>
    </div>
    <button id="beginButton">Begin Countdown Timer</button>
  </section>

  <!-- Timer View -->
  <section id="timer-view" class="view hidden">
    <p class="title" id="title_msg">Meeting starts in</p>
    <div class="container">
      <div class="container-segment">
        <div class="segment-title">Minutes</div>
        <div class="segment">
          <div class="flip-card" data-minutes-tens>
            <div class="top">0</div>
            <div class="bottom">0</div>
            <div class="top-flip">0</div>
            <div class="bottom-flip">0</div>
          </div>
          <div class="flip-card" data-minutes-ones>
            <div class="top">0</div>
            <div class="bottom">0</div>
            <div class="top-flip">0</div>
            <div class="bottom-flip">0</div>
          </div>
        </div>
      </div>
      <div class="container-segment">
        <div class="colon">:</div>
      </div>
      <div class="container-segment">
        <div class="segment-title">Seconds</div>
        <div class="segment">
          <div class="flip-card" data-seconds-tens>
            <div class="top">0</div>
            <div class="bottom">0</div>
            <div class="top-flip">0</div>
            <div class="bottom-flip">0</div>
          </div>
          <div class="flip-card" data-seconds-ones>
            <div class="top">0</div>
            <div class="bottom">0</div>
            <div class="top-flip">0</div>
            <div class="bottom-flip">0</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Finish View -->
  <section id="finish-view" class="view hidden">
    <div class="wrapper">
      <img src="attentionplease.png" alt="sign">
      <div class="box">
        <p>Ladies and Gentlemen<br> please take your seats.</p>
        <p class="red-text">Phones off, attention on.</p>
      </div>
      <audio id="finish-audio">
        <source src="sitplease.mp3" type="audio/mpeg">
      </audio>
      <button id="playAudioButton">Play Audio</button>
    </div>
  </section>
</body>
</html>
